<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INWARD TALLY</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
:root {
  --navy-deep: #050b18;
  --navy: #0a1630;
  --navy-mid: #0f2148;
  --cyan: #00e5ff;
  --cyan-soft: #7ff5ff;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(0,229,255,0.25);
  --text: #eaf6ff;
  --text-dim: #8fa9c2;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
  color: var(--text);
  padding: 28px 16px;
  background:
    radial-gradient(circle at 15% 10%, rgba(0,229,255,0.12), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(0,120,255,0.15), transparent 45%),
    linear-gradient(160deg, var(--navy-deep), var(--navy) 55%, var(--navy-mid));
  background-attachment: fixed;
}

.container {
  max-width: 560px;
  margin: auto;
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  padding: 24px 20px;
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  box-shadow:
    0 8px 40px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 0 40px rgba(0,229,255,0.06);
}

h2 {
  text-align: center;
  color: var(--cyan-soft);
  letter-spacing: 4px;
  font-weight: 700;
  margin: 0 0 20px 0;
  text-shadow: 0 0 18px rgba(0,229,255,0.5);
}

button {
  padding: 8px 14px;
  background: linear-gradient(135deg, rgba(0,229,255,0.18), rgba(0,120,255,0.12));
  border: 1px solid rgba(0,229,255,0.35);
  color: var(--cyan-soft);
  font-weight: 700;
  letter-spacing: 0.5px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s ease;
}

button:hover {
  background: linear-gradient(135deg, rgba(0,229,255,0.35), rgba(0,120,255,0.22));
  box-shadow: 0 0 16px rgba(0,229,255,0.35);
  transform: translateY(-1px);
}

button:active { transform: translateY(0); }

button:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}

.upload-area {
  border: 1px dashed var(--glass-border);
  background: rgba(255,255,255,0.03);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  margin-bottom: 18px;
}

.upload-area div {
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

input[type="file"] {
  color: var(--cyan-soft);
  font-size: 12px;
}

.station-row {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  margin-bottom: 20px;
}

.station-row label {
  color: var(--cyan-soft);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 1.5px;
}

.station-row input {
  width: 90px;
  text-align: center;
  padding: 8px;
  border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
}

.station-row input:focus {
  outline: none;
  border-color: var(--cyan);
  box-shadow: 0 0 12px rgba(0,229,255,0.35);
}

#processBtn {
  display: block;
  margin: 0 auto;
  padding: 10px 34px;
}

.summary-table {
  width: 100%;
  margin-top: 18px;
  border-collapse: separate;
  border-spacing: 0;
  display: none;
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  overflow: hidden;
  table-layout: fixed;
}

.summary-table td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(0,229,255,0.12);
  font-size: 13px;
  word-wrap: break-word;
  background: rgba(255,255,255,0.02);
}

.summary-table tr:last-child td { border-bottom: none; }

.heading {
  color: var(--cyan-soft);
  font-weight: 700;
  width: 42%;
  letter-spacing: 0.5px;
  background: rgba(0,229,255,0.05);
}

#wagonJson {
  width: 90%;
  height: 44px;
  font-size: 9px;
  background: rgba(0,0,0,0.35);
  color: var(--cyan-soft);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  padding: 6px;
}

.submit-btn {
  padding: 10px 34px;
  background: linear-gradient(135deg, var(--cyan), #0090c8);
  border: none;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  color: #001824;
  letter-spacing: 1px;
  box-shadow: 0 0 20px rgba(0,229,255,0.4);
}

.submit-btn:hover { box-shadow: 0 0 28px rgba(0,229,255,0.6); }

</style>
</head>

<body>
<div class="container">
    <h2>INWARD TALLY</h2>

    <div id="main-upload-section">
        <div class="upload-area">
            <div>PLEASE UPLOAD FILE HERE</div>
            <input type="file" id="csvFile">
        </div>
        <div class="station-row">
            <label>ENTER STATION CODE</label>
            <input type="text" id="stationInput" value="HAPA" maxlength="4">
        </div>
        <div style="text-align: center;">
            <button id="processBtn" onclick="processData()">PROCESS</button>
        </div>
    </div>

    <table id="summaryTable" class="summary-table"></table>
</div>

<script>
let globalData=[], globalHeader=[];
let currentPayload = []; 

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNwUvzpg0NtvMEWcaHzKK5jN7xu_nanojP1bHFNijzfibY_8hRRfFnq6E8zCsUGmKT/exec";
const SHEET_ID = "1lvGHvGO_sxHMG2RGCQFF4MyCw5COunN_jtg8_gFwqws";
const SHEET_NAME = "IW_Data";

document.getElementById("csvFile").addEventListener("change", e => {
    if(e.target.files.length === 0) return;
    Papa.parse(e.target.files[0], { skipEmptyLines: true, complete: (res) => {
        let rows = res.data;
        let hIdx = rows.findIndex(r => r.join(" ").includes("WAGON RLY"));
        globalHeader = rows[hIdx];
        globalData = rows.slice(hIdx + 1);
        alert("File Loaded Successfully!");
    }});
});

// BCN.. -> BCN (agar 4th char H nahi hain), BOXN.. -> BOXN (agar 5th char H nahi hain), baaki as-it-is
function getWagonType(val) {
    val = (val || "").toString().trim();
    if (val.substring(0,3) === "BCN" && val.charAt(3) !== "H") return "BCN";
    if (val.substring(0,4) === "BOXN" && val.charAt(4) !== "H") return "BOXN";
    return val;
}

// Free Hours for Unloading logic:
// Rake Type "M" => 5
// Rake Type "R" => based on No. of Wagons: <=20 => 5, 21-30 => 7, 31-44 => 9, >45 => 11
function computeFreeHours(rakeType, wagonCount) {
    let type = (rakeType || "").toString().trim().toUpperCase();
    let n = parseInt(wagonCount) || 0;
    if (type === "M") return 5;
    if (n < 21) return 5;
    if (n > 20 && n < 31) return 7;
    if (n > 30 && n < 45) return 9;
    if (n > 45) return 11;
    return 5;
}

function processData(){
    if(globalData.length === 0) { alert("Please upload a file first!"); return; }
    
    let station = document.getElementById("stationInput").value.toUpperCase();
    let filtered = globalData.filter(r =>
        r[globalHeader.indexOf("STTN TO")] == station &&
        !r[globalHeader.indexOf("WAGON TYPE")].startsWith("BV") &&
        r[globalHeader.indexOf("L. E.")] == "L"
    );

    if(filtered.length == 0){ alert("No data found"); return; }

    document.getElementById("main-upload-section").style.display = "none";

    let wagonCount = filtered.length;
    let invNums = filtered.map(r => parseInt(r[globalHeader.indexOf("INVOICE NO.")])).filter(n => !isNaN(n));
    let invDisplay = (Math.min(...invNums) == Math.max(...invNums)) ? Math.min(...invNums) : `${Math.min(...invNums)}-${Math.max(...invNums)}`;
    let totalWT = filtered.reduce((s, r) => s + (parseFloat(r[globalHeader.indexOf("WAGON ACTL WT(T)")]) || 0), 0);
    
    let rawDate = filtered[0][globalHeader.indexOf("INVOICE DATE")];
    let d = rawDate.split('-');
    let year = d[2].length === 4 ? d[2] : ('20' + d[2]);
    let finalDate = `${d[0]}-${d[1]}-${year}`;
    let sttnFrom = filtered[0][globalHeader.indexOf("STTN FROM")];
    let rakeId = `${sttnFrom}${station}${new Date().toLocaleDateString('en-GB').replace(/\//g,'')}01`;
    let rakeType = filtered[0][globalHeader.indexOf("RK PM")];
    let wagonType = getWagonType(filtered[0][globalHeader.indexOf("WAGON TYPE")]);
    let wagonSummary = JSON.stringify(filtered.map(r => ({RLY: r[globalHeader.indexOf("WAGON RLY")], TYPE: r[globalHeader.indexOf("WAGON TYPE")], NO: r[globalHeader.indexOf("WAGON NO")].toString()})));
    let freeHours = computeFreeHours(rakeType, wagonCount);

    // Data Mapping for Google Sheet (A to AC => 29 columns, index 0 to 28)
    // A-M (0-12): basic rake info, N-W (13-22): filled later via WTR page,
    // X (23): TOTAL DET. (filled later via WTR page), Y (24): FREE HRS. (filled now)
    currentPayload = new Array(29).fill("");
    currentPayload[0] = rakeId;                                        // A - RAKE ID
    currentPayload[1] = rakeType;                                      // B - RAKE TYPE
    currentPayload[2] = wagonType;                                     // C - WAGON TYPE
    currentPayload[3] = sttnFrom;                                      // D - STATION FROM
    currentPayload[4] = station;                                       // E - STATION TO
    currentPayload[5] = wagonCount;                                    // F - NO. OF WAGONS
    currentPayload[6] = invDisplay;                                    // G - INVOICE NO.
    currentPayload[7] = finalDate;                                     // H - INVOICE DATE
    currentPayload[8] = totalWT.toFixed(2);                            // I - ACTUAL WT (TONNE)
    currentPayload[9] = filtered[0][globalHeader.indexOf("CNSR")];     // J - CONSIGNER
    currentPayload[10] = filtered[0][globalHeader.indexOf("CNSG")];    // K - CONSIGNEE
    currentPayload[11] = filtered[0][globalHeader.indexOf("CMDT")];    // L - COMMODITY CODE
    // Index 12 (M Column - WAGON SUMMARY) sendToSheet mein textarea se liya jayega
    currentPayload[24] = freeHours;                                    // Y - FREE HRS. (FOR UNLOADING)

    document.getElementById("summaryTable").style.display = "table";
    document.getElementById("summaryTable").innerHTML = `
        <tr><td class="heading">RAKE ID</td><td>${rakeId}</td></tr>
        <tr><td class="heading">RAKE TYPE</td><td>${rakeType}</td></tr>
        <tr><td class="heading">WAGON TYPE</td><td>${wagonType}</td></tr>
        <tr><td class="heading">STATION FROM</td><td>${sttnFrom}</td></tr>
        <tr><td class="heading">STATION TO</td><td>${station}</td></tr>
        <tr><td class="heading">NO. OF WAGONS</td><td>${wagonCount}</td></tr>
        <tr><td class="heading">INVOICE NO.</td><td>${invDisplay}</td></tr>
        <tr><td class="heading">INVOICE DATE</td><td>${finalDate}</td></tr>
        <tr><td class="heading">ACTUAL WT (TONNE)</td><td>${totalWT.toFixed(2)}</td></tr>
        <tr><td class="heading">CONSIGNER</td><td>${filtered[0][globalHeader.indexOf("CNSR")]}</td></tr>
        <tr><td class="heading">CONSIGNEE</td><td>${filtered[0][globalHeader.indexOf("CNSG")]}</td></tr>
        <tr><td class="heading">COMMODITY CODE</td><td>${filtered[0][globalHeader.indexOf("CMDT")]}</td></tr>
        <tr><td class="heading">WAGON SUMMARY</td><td><textarea id="wagonJson">${wagonSummary}</textarea></td></tr>
        <tr><td class="heading">FREE HOURS FOR UNLOADING</td><td>${freeHours}</td></tr>
        <tr><td class="heading">STATUS</td><td id="statusValueCell"></td></tr>
        <tr><td colspan="2" style="text-align:center; padding:12px;">
            <button class="submit-btn" id="submitBtn" onclick="sendToSheet()">SUBMIT</button>
        </td></tr>
    `;
}

function sendToSheet() {
    // Wagon Summary ko M (Index 12) mein set kar rahe hain
    currentPayload[12] = document.getElementById("wagonJson").value;

    let submitBtn = document.getElementById("submitBtn");
    submitBtn.disabled = true;
    submitBtn.innerText = "SENDING...";

    let payload = {
        action: "insert",
        sheetId: SHEET_ID,
        sheetName: SHEET_NAME,
        data: currentPayload
    };

    fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(res => {
        if (res.status === "duplicate") {
            alert("DUPLICATE ENTRY !!! RAKE ID '" + currentPayload[0] + "' Already Exist in Google Sheet.");
        } else if (res.status === "success") {
            alert("DATA SENT SUCCESSFULLY !!!");
            location.reload();
            document.getElementById("statusValueCell").innerText = "ARRIVED";
            
        } else {
            alert("ERROR: " + (res.message || "Error..."));
        }
    })
    .catch(err => {
        console.error(err);
        alert("ERROR: Check console.");
    })
    .finally(() => {
        submitBtn.disabled = false;
        submitBtn.innerText = "SUBMIT";
    });
}
</script>
</body>
</html>
