<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Gallery - HAPA GOODS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep: #060d1a;
    --navy: #0b1a2e;
    --cyan: #22d3ee;
    --cyan-bright: #67e8f9;
    --cyan-deep: #0891b2;
    --glass: rgba(148, 209, 230, 0.08);
    --glass-border: rgba(148, 224, 255, 0.2);
    --ink: #eaf6fb;
    --ink-dim: #93b3c7;
    --danger: #f87171;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at 15% 10%, rgba(34,211,238,0.14), transparent 45%),
                radial-gradient(circle at 85% 30%, rgba(8,145,178,0.16), transparent 50%),
                radial-gradient(circle at 50% 95%, rgba(34,211,238,0.09), transparent 55%),
                linear-gradient(180deg, var(--navy-deep), var(--navy) 45%, var(--navy-deep));
    color: var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
    padding: 40px 0;
  }

  .orb{ position:fixed; border-radius:50%; filter:blur(70px); pointer-events:none; opacity:.45; z-index:0; }
  .orb.one{ width:420px; height:420px; background:radial-gradient(circle, rgba(34,211,238,.35), transparent 70%); top:-140px; left:-120px; }
  .orb.two{ width:360px; height:360px; background:radial-gradient(circle, rgba(103,232,249,.25), transparent 70%); bottom:-120px; right:-100px; }

  header{
    text-align:center;
    z-index:2;
    margin-bottom: 30px;
    padding: 0 6vw;
  }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size:12px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--cyan-bright);
    background:var(--glass); border:1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    padding:6px 15px; border-radius:999px; margin-bottom:20px;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: clamp(2rem, 4.6vw, 3.2rem);
    letter-spacing:-0.02em;
    background: linear-gradient(120deg, #fff 10%, var(--cyan-bright) 55%, var(--cyan-deep) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  .toolbar{
    z-index:2;
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom: 26px;
  }
  .btn{
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:13px;
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 20px;
    border-radius:999px;
    border:1px solid var(--glass-border);
    background: var(--glass);
    color: var(--ink);
    cursor:pointer;
    text-decoration:none;
    backdrop-filter: blur(12px);
    transition: all .25s ease;
  }
  .btn:hover{
    color:#04222c;
    background: linear-gradient(120deg, var(--cyan-bright), var(--cyan-deep));
    border-color: transparent;
    box-shadow: 0 0 26px rgba(34,211,238,.35);
  }
  .btn.ghost:hover{
    color: var(--ink);
    background: rgba(148,224,255,0.14);
    box-shadow:none;
  }

  .status-line{
    z-index:2;
    font-size:12.5px;
    color: var(--ink-dim);
    margin-bottom: 18px;
    min-height: 16px;
    text-align:center;
  }
  .status-line.err{ color: var(--danger); }

  .stage{
    position:relative;
    width:100%;
    max-width:1200px;
    height:420px;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2;
    perspective: 1400px;
  }

  .track{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .empty-state{
    text-align:center;
    color: var(--ink-dim);
    font-size:14px;
    z-index:2;
    max-width:320px;
    line-height:1.6;
  }

  .card{
    position:absolute;
    width:340px;
    height:400px;
    border-radius: 22px;
    overflow:hidden;
    cursor:pointer;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    transition: transform .55s cubic-bezier(.22,.9,.28,1), opacity .55s ease, filter .55s ease;
  }

  .card img{
    width:100%; height:100%; object-fit:cover;
    display:block;
    background: rgba(148,224,255,0.06);
  }

  .card-actions{
    position:absolute; top:14px; right:14px;
    display:flex; gap:8px;
    opacity:0;
    transition: opacity .3s ease;
    z-index:2;
  }
  .card.pos-0 .card-actions{ opacity:1; }
  .icon-btn{
    width:34px; height:34px; border-radius:50%;
    background: rgba(6,15,26,0.6);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(8px);
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    text-decoration:none;
    font-size:14px;
    cursor:pointer;
    transition: all .2s ease;
  }
  .icon-btn:hover{
    background: var(--cyan-bright);
    color:#04222c;
  }

  .card::after{
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(6,13,26,0) 55%, rgba(6,13,26,0.55));
    opacity:0;
    transition: opacity .5s ease;
  }

  .card.pos-0{ transform: translateX(0) translateZ(0) rotateY(0deg) scale(1); z-index:5; filter: none; }
  .card.pos--1{ transform: translateX(-230px) translateZ(-120px) rotateY(28deg) scale(.86); z-index:4; filter: brightness(.7) saturate(.85); }
  .card.pos-1{ transform: translateX(230px) translateZ(-120px) rotateY(-28deg) scale(.86); z-index:4; filter: brightness(.7) saturate(.85); }
  .card.pos--2{ transform: translateX(-420px) translateZ(-260px) rotateY(34deg) scale(.72); z-index:3; filter: brightness(.5) saturate(.7); }
  .card.pos-2{ transform: translateX(420px) translateZ(-260px) rotateY(-34deg) scale(.72); z-index:3; filter: brightness(.5) saturate(.7); }
  .card.pos-far{ transform: translateX(0) translateZ(-400px) scale(.5); opacity:0; z-index:1; pointer-events:none; }

  .card:not(.pos-0)::after{ opacity:1; }

  .card-caption{
    position:absolute; left:18px; right:18px; bottom:16px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:15px;
    display:flex;
    justify-content:center;
    text-align:center;
    opacity:0;
    transform: translateY(6px);
    transition: all .4s ease;
  }
  .card-caption .view{
    background: var(--navy);
    color: var(--cyan);
    padding:8px 18px;
    border-radius:10px;
    border:1px solid var(--glass-border);
  }
  .card.pos-0 .card-caption{ opacity:1; transform:translateY(0); }

  .caption-edit{
    display:none;
    flex-direction:column;
    gap:8px;
    width:100%;
  }
  .caption-edit.active{ display:flex; }
  .caption-edit input{
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    padding:8px 10px;
    border-radius:8px;
    border:1px solid var(--glass-border);
    background: rgba(6,15,26,0.8);
    color:#fff;
    outline:none;
  }
  .caption-edit input:focus{ border-color: var(--cyan-bright); }
  .caption-edit .edit-row{ display:flex; gap:6px; }
  .caption-edit .edit-row button{
    flex:1;
    font-size:12px;
    padding:7px 0;
    border-radius:8px;
    border:1px solid var(--glass-border);
    cursor:pointer;
    font-family:'Inter', sans-serif;
  }
  .caption-edit .save-btn{ background: var(--cyan-bright); color:#04222c; border-color:transparent; }
  .caption-edit .cancel-btn{ background: rgba(255,255,255,0.06); color: var(--ink); }
  .card.editing .card-caption > .view{ display:none; }
  .caption-edit .edit-err{ font-size:11.5px; color: var(--danger); min-height:14px; }

  .nav{
    display:flex; gap:16px;
    margin-top: 40px;
    z-index:2;
  }
  .nav button{
    width:48px; height:48px;
    border-radius:50%;
    background: var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    color: var(--ink);
    font-size:18px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: all .25s ease;
  }
  .nav button:hover{
    color:#04222c;
    background: linear-gradient(120deg, var(--cyan-bright), var(--cyan-deep));
    border-color: transparent;
    box-shadow: 0 0 26px rgba(34,211,238,.45);
  }

  .dots{
    display:flex; gap:8px;
    margin-top:22px;
    z-index:2;
  }
  .dot{
    width:7px; height:7px; border-radius:50%;
    background: rgba(148,224,255,0.3);
    transition: all .3s ease;
    cursor:pointer;
  }
  .dot.active{ background: var(--cyan-bright); width:22px; border-radius:4px; box-shadow: 0 0 12px rgba(34,211,238,.6); }

  @media (max-width: 760px){
    .stage{ height:340px; }
    .card{ width:250px; height:310px; }
    .card.pos--1{ transform: translateX(-140px) translateZ(-120px) rotateY(28deg) scale(.8); }
    .card.pos-1{ transform: translateX(140px) translateZ(-120px) rotateY(-28deg) scale(.8); }
    .card.pos--2, .card.pos-2{ opacity:0; pointer-events:none; }
  }
</style>
</head>
<body>

<div class="orb one"></div>
<div class="orb two"></div>

<header>
  <span class="eyebrow">HAPA GOODS - RAJKOT DIVISION (W.R.)</span>
  <h1>Photo Gallery</h1>
</header>

<div class="toolbar">
  <button class="btn ghost" id="refreshBtn">&#8635; Refresh</button>
</div>

<div class="status-line" id="statusLine"></div>

<div class="stage">
  <div class="track" id="track"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    No photos yet. Click "Upload Photo" to add your first photo.
  </div>
</div>

<div class="nav">
  <button id="prevBtn" aria-label="Previous">&#8592;</button>
  <button id="nextBtn" aria-label="Next">&#8594;</button>
</div>

<div class="dots" id="dots"></div>

<script>
  // ============================================================
  // CONFIG -- paste your Google Apps Script Web App URL here
  // (the same URL must also be used in upload.html)
  // ============================================================
  const CONFIG = {
    SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxt2Er5ruBQJKJaxUqnuBxl8GhX4hZsDRYEIGKnHlapTUZYr06IjvQeD_T8rS7-tTj-KQ/exec'
  };

  let photos = [];
  let current = 0;

  const track = document.getElementById('track');
  const dotsWrap = document.getElementById('dots');
  const emptyState = document.getElementById('emptyState');
  const statusLine = document.getElementById('statusLine');

  function setStatus(msg, isErr){
    statusLine.textContent = msg || '';
    statusLine.classList.toggle('err', !!isErr);
  }

  function isConfigured(){
    return CONFIG.SCRIPT_URL && CONFIG.SCRIPT_URL.indexOf('PASTE_YOUR') === -1;
  }

  async function loadPhotos(){
    if (!isConfigured()){
      setStatus('CONFIG.SCRIPT_URL is not set -- deploy your Apps Script and paste the URL here.', true);
      photos = [];
      build();
      return;
    }
    setStatus('Loading photos...');
    try{
      const res = await fetch(CONFIG.SCRIPT_URL + '?action=list');
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      photos = data.photos || [];
      setStatus('');
      current = 0;
      build();
    }catch(err){
      setStatus('Could not load photos: ' + err.message, true);
      photos = [];
      build();
    }
  }

  function build(){
    track.innerHTML = '';
    emptyState.style.display = photos.length ? 'none' : 'flex';

    photos.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.index = i;
      card.innerHTML =
        '<img src="' + p.viewUrl + '" alt="' + escapeHtml(p.caption) + '" loading="lazy">' +
        '<div class="card-actions">' +
          '<button class="icon-btn edit-btn" title="Edit caption">&#9998;</button>' +
          '<a class="icon-btn" href="' + p.downloadUrl + '" title="Download" target="_blank" rel="noopener">&#11015;</a>' +
        '</div>' +
        '<div class="card-caption">' +
          '<div class="view">' + escapeHtml(p.caption) + '</div>' +
          '<div class="caption-edit">' +
            '<input type="text" class="edit-caption" value="' + escapeAttr(p.caption) + '" placeholder="Caption">' +
            '<input type="password" class="edit-password" placeholder="Password">' +
            '<div class="edit-err"></div>' +
            '<div class="edit-row">' +
              '<button class="save-btn">Save</button>' +
              '<button class="cancel-btn">Cancel</button>' +
            '</div>' +
          '</div>' +
        '</div>';

      card.addEventListener('click', (e) => {
        if (e.target.closest('.card-actions') || e.target.closest('.caption-edit')) return;
        current = i; update();
      });

      card.querySelector('.edit-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        current = i; update();
        toggleEdit(card, true);
      });
      card.querySelector('.cancel-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleEdit(card, false);
      });
      card.querySelector('.save-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        const newCaption = card.querySelector('.edit-caption').value.trim() || p.caption;
        const password = card.querySelector('.edit-password').value;
        await saveCaption(p, newCaption, password, card);
      });

      track.appendChild(card);
    });

    dotsWrap.innerHTML = '';
    photos.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.addEventListener('click', () => { current = i; update(); });
      dotsWrap.appendChild(dot);
    });

    update();
  }

  function toggleEdit(card, on){
    card.classList.toggle('editing', on);
    card.querySelector('.caption-edit').classList.toggle('active', on);
    if (on){
      card.querySelector('.edit-err').textContent = '';
      card.querySelector('.edit-password').value = '';
    }
  }

  async function saveCaption(photo, caption, password, card){
    const saveBtn = card.querySelector('.save-btn');
    const errBox = card.querySelector('.edit-err');
    errBox.textContent = '';
    if (!password){
      errBox.textContent = 'Please enter the password.';
      return;
    }
    saveBtn.textContent = 'Saving...';
    try{
      const res = await fetch(CONFIG.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'updateCaption', id: photo.id, caption: caption, password: password })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      photo.caption = caption;
      build();
    }catch(err){
      errBox.textContent = err.message;
      saveBtn.textContent = 'Save';
    }
  }

  function update(){
    const cards = track.querySelectorAll('.card');
    const n = photos.length;
    cards.forEach((card, i) => {
      let diff = i - current;
      if (diff > n/2) diff -= n;
      if (diff < -n/2) diff += n;

      const wasEditing = card.classList.contains('editing');
      card.className = 'card';
      if (wasEditing && diff === 0) card.classList.add('editing');

      if (diff === 0) card.classList.add('pos-0');
      else if (diff === -1) card.classList.add('pos--1');
      else if (diff === 1) card.classList.add('pos-1');
      else if (diff === -2) card.classList.add('pos--2');
      else if (diff === 2) card.classList.add('pos-2');
      else card.classList.add('pos-far');
    });

    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (!photos.length) return;
    current = (current - 1 + photos.length) % photos.length;
    update();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (!photos.length) return;
    current = (current + 1) % photos.length;
    update();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
    if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  });
  document.getElementById('refreshBtn').addEventListener('click', loadPhotos);

  function escapeHtml(str){
    return String(str || '').replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }
  function escapeAttr(str){ return escapeHtml(str); }

  loadPhotos();
</script>

</body>
</html>
