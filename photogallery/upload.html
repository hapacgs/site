<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperture — Upload Photo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep: #060d1a;
    --navy: #0b1a2e;
    --cyan: #22d3ee;
    --cyan-bright: #67e8f9;
    --cyan-deep: #0891b2;
    --glass: rgba(148, 209, 230, 0.08);
    --glass-border: rgba(148, 224, 255, 0.2);
    --ink: #eaf6fb;
    --ink-dim: #93b3c7;
    --danger: #f87171;
    --ok: #6ee7b7;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at 15% 10%, rgba(34,211,238,0.14), transparent 45%),
                radial-gradient(circle at 85% 30%, rgba(8,145,178,0.16), transparent 50%),
                radial-gradient(circle at 50% 95%, rgba(34,211,238,0.09), transparent 55%),
                linear-gradient(180deg, var(--navy-deep), var(--navy) 45%, var(--navy-deep));
    color: var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
    padding: 40px 20px;
  }

  .orb{ position:fixed; border-radius:50%; filter:blur(70px); pointer-events:none; opacity:.45; z-index:0; }
  .orb.one{ width:420px; height:420px; background:radial-gradient(circle, rgba(34,211,238,.35), transparent 70%); top:-140px; left:-120px; }
  .orb.two{ width:360px; height:360px; background:radial-gradient(circle, rgba(103,232,249,.25), transparent 70%); bottom:-120px; right:-100px; }

  header{
    text-align:center;
    z-index:2;
    margin-bottom: 30px;
  }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size:12px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--cyan-bright);
    background:var(--glass); border:1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    padding:6px 15px; border-radius:999px; margin-bottom:20px;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    letter-spacing:-0.02em;
    background: linear-gradient(120deg, #fff 10%, var(--cyan-bright) 55%, var(--cyan-deep) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  .panel{
    width:100%; max-width:440px;
    background: linear-gradient(160deg, rgba(11,26,46,0.85), rgba(6,13,26,0.9));
    border:1px solid var(--glass-border);
    border-radius:22px;
    padding:32px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    backdrop-filter: blur(14px);
    z-index:2;
  }

  .field{ margin-bottom:18px; }
  .field label{
    display:block; font-size:11.5px; letter-spacing:.08em; text-transform:uppercase;
    color: var(--cyan-bright); margin-bottom:7px;
  }
  .field input[type="text"], .field input[type="password"]{
    width:100%;
    font-family:'Inter', sans-serif;
    font-size:14px;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--glass-border);
    background: rgba(148,224,255,0.06);
    color:#fff;
    outline:none;
  }
  .field input:focus{ border-color: var(--cyan-bright); }

  .file-drop{
    border:1.5px dashed var(--glass-border);
    border-radius:14px;
    padding:34px 14px;
    text-align:center;
    cursor:pointer;
    color: var(--ink-dim);
    font-size:13px;
    transition: all .2s ease;
    position:relative;
  }
  .file-drop:hover{ border-color: var(--cyan-bright); color: var(--ink); }
  .file-drop input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .file-drop.has-file{ color: var(--cyan-bright); border-style:solid; }

  .preview{
    width:100%; max-height:200px; object-fit:contain;
    border-radius:10px; margin-top:12px; display:none;
  }

  .btn{
    width:100%;
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:14px;
    padding:13px 0;
    border-radius:999px;
    border:1px solid var(--glass-border);
    background: linear-gradient(120deg, var(--cyan-bright), var(--cyan-deep));
    color:#04222c;
    cursor:pointer;
    transition: all .2s ease;
    margin-top:6px;
  }
  .btn:hover{ box-shadow: 0 0 26px rgba(34,211,238,.4); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; box-shadow:none; }

  .msg{
    font-size:12.5px;
    margin-top:14px;
    text-align:center;
    min-height:16px;
    color: var(--ink-dim);
  }
  .msg.err{ color: var(--danger); }
  .msg.ok{ color: var(--ok); }

  .back-link{
    display:inline-block;
    margin-top:22px;
    font-size:13px;
    color: var(--ink-dim);
    text-decoration:none;
    z-index:2;
  }
  .back-link:hover{ color: var(--cyan-bright); }
</style>
</head>
<body>

<div class="orb one"></div>
<div class="orb two"></div>

<header>
  <span class="eyebrow">Aperture Collection</span>
  <h1>Upload a Photo</h1>
</header>

<div class="panel">
  <div class="field">
    <label>Photo</label>
    <div class="file-drop" id="fileDrop">
      <span id="fileDropLabel">Select Photo From Here</span>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <img id="previewImg" class="preview">
  </div>

  <div class="field">
    <label>Caption</label>
    <input type="text" id="captionInput" placeholder="e.g. Ridgeline at Dusk">
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="Upload password">
  </div>

  <button class="btn" id="uploadBtn">Upload Photo</button>
  <div class="msg" id="msg"></div>
</div>

<a class="back-link" href="photo-gallery-carousel.html">&#8592; Back to Gallery</a>

<script>
  // ============================================================
  // CONFIG -- paste the same Apps Script Web App URL here
  // that is used on the gallery page
  // ============================================================
  const CONFIG = {
    SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxt2Er5ruBQJKJaxUqnuBxl8GhX4hZsDRYEIGKnHlapTUZYr06IjvQeD_T8rS7-tTj-KQ/exec'
  };

  const fileInput = document.getElementById('fileInput');
  const fileDrop = document.getElementById('fileDrop');
  const fileDropLabel = document.getElementById('fileDropLabel');
  const previewImg = document.getElementById('previewImg');
  const captionInput = document.getElementById('captionInput');
  const passwordInput = document.getElementById('passwordInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const msg = document.getElementById('msg');

  let selectedFile = null;

  function setMsg(text, type){
    msg.textContent = text || '';
    msg.className = 'msg' + (type ? ' ' + type : '');
  }

  function isConfigured(){
    return CONFIG.SCRIPT_URL && CONFIG.SCRIPT_URL.indexOf('PASTE_YOUR') === -1;
  }

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    selectedFile = file;
    fileDropLabel.textContent = file.name;
    fileDrop.classList.add('has-file');
    if (!captionInput.value) captionInput.value = file.name.replace(/\.[^.]+$/, '');

    const reader = new FileReader();
    reader.onload = () => {
      previewImg.src = reader.result;
      previewImg.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  uploadBtn.addEventListener('click', async () => {
    setMsg('');
    if (!isConfigured()){
      setMsg('CONFIG.SCRIPT_URL is not set.', 'err');
      return;
    }
    if (!selectedFile){
      setMsg('Select Your Photo...', 'err');
      return;
    }
    if (!passwordInput.value){
      setMsg('Please Enter Password.', 'err');
      return;
    }

    uploadBtn.disabled = true;
    setMsg('Uploading... Please Wait ');

    try{
      const base64 = await fileToBase64(selectedFile);
      const res = await fetch(CONFIG.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'upload',
          data: base64,
          mimeType: selectedFile.type,
          fileName: selectedFile.name,
          caption: captionInput.value.trim() || selectedFile.name,
          password: passwordInput.value
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      setMsg('Success !!! Photo Uploaded to Gallery...', 'ok');
      selectedFile = null;
      fileInput.value = '';
      fileDropLabel.textContent = 'Click & Select Photo';
      fileDrop.classList.remove('has-file');
      previewImg.style.display = 'none';
      captionInput.value = '';
      passwordInput.value = '';
    }catch(err){
      setMsg('Upload fail: ' + err.message, 'err');
    }finally{
      uploadBtn.disabled = false;
    }
  });

  function fileToBase64(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
</script>

</body>
</html>
